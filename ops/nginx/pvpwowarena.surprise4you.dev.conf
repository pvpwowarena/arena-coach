# Nginx конфиг для pvpwowarena.surprise4you.dev
# После certbot --nginx сюда автоматически добавятся ssl_certificate блоки.
#
# Копирование на сервер:
#   sudo cp ops/nginx/pvpwowarena.surprise4you.dev.conf \
#            /etc/nginx/sites-available/pvpwowarena.surprise4you.dev
#   sudo ln -sf /etc/nginx/sites-available/pvpwowarena.surprise4you.dev \
#               /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ── HTTP → HTTPS редирект ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name pvpwowarena.surprise4you.dev;

    # Certbot ACME challenge — должен быть доступен по HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name pvpwowarena.surprise4you.dev;

    # Сертификаты — certbot заполнит этот блок автоматически.
    # Если запускаешь certbot --nginx, эти строки появятся сами.
    # Если certbot ещё не запущен — раскомментировать вручную после получения:
    # ssl_certificate     /etc/letsencrypt/live/pvpwowarena.surprise4you.dev/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/pvpwowarena.surprise4you.dev/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Безопасность ──────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "DENY"                                always;

    # ── Статическая страница скачивания ──────────────────────────────────────
    location = /download {
        root /var/www/arena-coach;
        try_files /download.html =404;
        add_header Cache-Control "no-cache";
    }

    location = /download.html {
        root /var/www/arena-coach;
        add_header Cache-Control "no-cache";
    }

    # ── FastAPI endpoints ─────────────────────────────────────────────────────

    # POST /v1/events (bridge → backend)
    location /v1/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Health check (мониторинг)
    location = /health {
        proxy_pass         http://127.0.0.1:8000/health;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        access_log off;
    }

    # FastAPI OpenAPI docs (только для разработки — убрать на проде)
    location /docs {
        proxy_pass         http://127.0.0.1:8000/docs;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass         http://127.0.0.1:8000/openapi.json;
        proxy_set_header   Host              $host;
    }

    # ── Всё остальное — 404 ───────────────────────────────────────────────────
    location / {
        return 404 "Not Found\n";
        add_header Content-Type text/plain;
    }

    # ── Логи ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/pvpwowarena.access.log;
    error_log  /var/log/nginx/pvpwowarena.error.log warn;
}
