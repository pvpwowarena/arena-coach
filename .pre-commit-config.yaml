repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # NB: mypy сознательно НЕ в pre-commit — у проекта много runtime-зависимостей
  # (sqlalchemy, fastapi, httpx, anthropic, discord.py, pydantic-settings, cryptography,
  # alembic), которые надо иметь установленными в локальном venv. На CI это работает
  # из коробки (`pip install -e backend -e bridge -e ingest` перед mypy). Если хочешь
  # mypy локально — поставь зависимости и запускай руками:
  #   python -m pip install -e backend -e bridge -e ingest "mypy>=1.11,<2" types-PyYAML
  #   mypy backend bridge ingest

  - repo: local
    hooks:
      - id: no-saved-variables
        name: запретить коммит SavedVariables.lua
        entry: |
          bash -c 'if git diff --cached --name-only | grep -i "SavedVariables"; then echo "ОТКАЗ — SavedVariables.lua не должен попадать в репо"; exit 1; fi'
        language: system
        pass_filenames: false
