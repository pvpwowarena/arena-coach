name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint+typecheck+test (py${{ matrix.python }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install workspace
        run: |
          python -m pip install --upgrade pip
          # Сначала dev-tooling
          pip install ruff mypy pytest pytest-asyncio types-PyYAML
          # Затем editable installs наших пакетов
          pip install -e backend -e bridge -e ingest

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: Mypy --strict
        run: mypy backend bridge ingest

      - name: Pytest
        run: pytest -v

  kb-validation:
    name: KB schema validation
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          pip install -e backend -e ingest
      - name: Validate every kb/matchups/*.md against schema
        run: python -m arena_coach.kb.loader --validate-all kb/matchups
