name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint+typecheck+test (py${{ matrix.python }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # 3.10 — минимум для прод-сервера. 3.12 — для будущего.
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install workspace
        run: |
          python -m pip install --upgrade pip
          # Версии зафиксированы в соответствии с dev-extras backend/pyproject.toml
          # чтобы CI был детерминированным на всех Python 3.10-3.12
          pip install \
            "ruff>=0.6,<1" \
            "mypy>=1.11,<2" \
            "pytest>=7,<9" \
            "pytest-asyncio>=0.23,<1" \
            "types-PyYAML"
          # Editable installs — строго по порядку, чтобы ingest увидел backend
          pip install -e backend
          pip install -e bridge
          pip install -e ingest

      - name: Show installed versions
        run: pip show ruff mypy pytest pytest-asyncio | grep -E "^(Name|Version)"

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: Mypy --strict
        run: mypy backend bridge ingest

      - name: Pytest
        run: pytest -v

  kb-validation:
    name: KB schema validation
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: |
          pip install -e backend
          pip install -e ingest
      - name: Validate every kb/drafts/*.md against schema
        run: python -m arena_coach validate-kb kb/drafts
